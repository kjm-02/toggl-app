<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        /* 全体 */
        body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #f6f7f9;
        color: #333;
        padding: 30px;
        }

        /* コンテナ（カード） */
        .container {
        max-width: 480px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        text-align: center;
        }

        /* アバター */
        .avatar {
        display: block;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 2px solid #4a90e2;
        margin: 0 auto 16px;
        object-fit: cover;
        background: #ddd;
        }

        /* アバターfallback */
        .avatar[src=""], 
        .avatar:not([src]) {
        display: none;
        }

        .avatar-fallback {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin: 0 auto 16px;
        background: #4a90e2;
        color: white;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        }

        /* バッジ */
        .badge {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(74, 144, 226, 0.1);
        color: #4a90e2;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 12px;
        }

        /* 名前 */
        h2 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 4px;
        }

        /* メール */
        .email {
        color: #777;
        margin-bottom: 20px;
        }

        /* 情報カード */
        .info-card {
        background: #fafafa;
        border-radius: 8px;
        padding: 16px;
        margin-top: 20px;
        text-align: left;
        }

        /* 行 */
        .info-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
        border-bottom: none;
        }

        /* ラベル */
        .info-label {
        color: #666;
        font-size: 14px;
        }

        /* 値 */
        .info-value {
        color: #333;
        font-size: 14px;
        font-weight: 500;
        }

        /* ボタン */
        .btn-logout {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 14px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
        }

        .btn-logout:hover {
        opacity: 0.85;
        }

        .btn-edit {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 16px;
        background: #3191d1;
        color: white;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
        }

        .back-home-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 14px;
        background: #2061ac;
        color: white;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
        }

        .btn-logout:hover {
        opacity: 0.85;
        }

        .buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        width: 100%;
        }
                
        .header-left {
        position: fixed;
        top: 20px;
        left: 20px;
        }

        .header-right {
        position: fixed;
        top: 20px;
        right: 20px;
        }
                
        input {
        padding: 5px 6px;
        margin: 4px 4px 8px 0;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
        transition: 0.2s;
        }

        input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
        }

    </style>
</head>

<div class="header-left">
  <a href="/">
    <button class="back-home-btn">ホーム</button>
  </a>
</div>

<div class="header-right">
  <a href="/logout">
    <button class="btn-logout">ログアウト</button>
  </a>
</div>

<body>
    <div class="container">
        <img class="avatar" src="{{ .picture }}" alt="{{ .name }}" onerror="this.style.display='none';document.getElementById('avatar-fallback').style.display='flex';" />
        <div id="avatar-fallback" class="avatar-fallback">{{ if .nickname }}{{ slice .nickname 0 1 }}{{ else }}?{{ end }}</div>
        <span class="badge">Authenticated</span>
        <h2>{{ .nickname }}</h2>
        <p class="email">{{ .email }}</p>
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="name">{{ .name }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Nickname</span>
                <span class="info-value" id="nickname">{{ .nickname }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" id="email">{{ .email }}</span>
            </div>
        </div>

        <div class="buttons">
            <button id="editBtn" onclick="editUser()" class="btn-edit">編集</button>
            <button id="saveBtn" onclick="saveUser()" class="btn-edit" style="display: none;">保存</button>
        </div>
    </div>
    <script src="./static/user.js"></script>
</body>
</html>
